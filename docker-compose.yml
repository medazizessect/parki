# Circuli - Smart Traffic & Parking Analytics
# Main Docker Compose - All Services

version: "3.8"

services:
  # ---------- PostgreSQL (Airflow metadata store) ----------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circuli-network
    restart: always

  # ---------- Airflow one-time DB init ----------
  airflow-init:
    image: apache/airflow:2.7.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    entrypoint: /bin/bash
    command: >
      -c "airflow db init &&
          airflow users create
            --username airflow
            --password airflow
            --firstname Airflow
            --lastname Admin
            --role Admin
            --email admin@circuli.local"
    restart: "no"
    networks:
      - circuli-network

  # ---------- Airflow Webserver ----------
  airflow-webserver:
    image: apache/airflow:2.7.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__WEBSERVER__RBAC: "True"
    ports:
      - "8080:8080"
    command: airflow webserver
    volumes:
      - ./capture_reconnaissance/airflow_dags:/opt/airflow/dags
      - ./capture_reconnaissance/config:/opt/airflow/config
      - airflow-logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - circuli-network
    restart: always

  # ---------- Airflow Scheduler ----------
  airflow-scheduler:
    image: apache/airflow:2.7.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__WEBSERVER__RBAC: "True"
    command: airflow scheduler
    volumes:
      - ./capture_reconnaissance/airflow_dags:/opt/airflow/dags
      - ./capture_reconnaissance/config:/opt/airflow/config
      - airflow-logs:/opt/airflow/logs
    networks:
      - circuli-network
    restart: always

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: circuli
      GF_APP_NAME: Circuli Analytics
    volumes:
      - ./bi_analytics/grafana/dashboards:/var/lib/grafana/dashboards
      - ./bi_analytics/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - circuli-network
    restart: always

  # ---------- Circuli API ----------
  circuli-api:
    build: ./bi_analytics
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Circuli
      DATABASE_URL: mysql://circuli:circuli@mysql:3306/circuli
    volumes:
      - ./bi_analytics/static:/app/static
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - circuli-network
    restart: always
    depends_on:
      - grafana

  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: circuli
      MYSQL_USER: circuli
      MYSQL_PASSWORD: circuli
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circuli-network
    restart: always

networks:
  circuli-network:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs:
  grafana-data:
  mysql-data:
